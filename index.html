<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数つなぎ — Number Chain</title>
<style>
  :root{
    --bg:#10131c; --panel:#1b2030; --tile:#2a3142; --accent:#ffce4d;
    --ink:#f4f6fb; --sub:#8b93a8;
    --c1:#5ec8f5; --c2:#7ee08a; --c3:#ffce4d; --c4:#ff9b6a; --c5:#e873c4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(circle at 50% 0%,#1c2236,#0c0e16);
    color:var(--ink);font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;overflow:hidden;user-select:none;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  #app{width:100%;max-width:440px;display:flex;flex-direction:column;
    height:100vh;height:100dvh;padding:10px 14px;}
  header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px;}
  h1{font-size:20px;letter-spacing:.04em;font-weight:800;}
  h1 small{color:var(--accent);font-size:12px;display:block;letter-spacing:.2em;font-weight:600;}
  .stats{display:flex;gap:8px;}
  .stat{background:var(--panel);border-radius:12px;padding:6px 12px;text-align:center;min-width:74px;}
  .stat .label{font-size:10px;color:var(--sub);letter-spacing:.1em;}
  .stat .val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;}
  #timebar{height:7px;background:var(--panel);border-radius:4px;overflow:hidden;margin:6px 0 4px;}
  #timefill{height:100%;width:100%;background:linear-gradient(90deg,#7ee08a,#ffce4d,#ff6a6a);
    transition:width .1s linear;}
  #combo{height:22px;text-align:center;font-weight:800;font-size:15px;
    color:var(--accent);opacity:0;transition:opacity .2s;}
  #combo.show{opacity:1;}
  #boardWrap{flex:1;display:flex;align-items:center;justify-content:center;}
  #board{position:relative;touch-action:none;background:var(--panel);
    border-radius:16px;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,.5);}
  .cell{position:absolute;display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:800;border-radius:12px;color:#10131c;
    transition:transform .14s cubic-bezier(.3,1.4,.5,1),top .18s ease,opacity .15s;
    will-change:transform,top;}
  .cell.v1{background:var(--c1);} .cell.v2{background:var(--c2);}
  .cell.v3{background:var(--c3);} .cell.v4{background:var(--c4);}
  .cell.v5{background:var(--c5);}
  .cell.sel{transform:scale(1.14);box-shadow:0 0 0 3px #fff,0 0 16px rgba(255,255,255,.6);z-index:5;}
  .cell.pop{animation:pop .26s forwards;}
  @keyframes pop{60%{transform:scale(1.3);opacity:1;}100%{transform:scale(0);opacity:0;}}
  svg#link{position:absolute;left:0;top:0;pointer-events:none;z-index:4;overflow:visible;}
  #hint{text-align:center;font-size:12px;color:var(--sub);margin-top:8px;height:16px;}
  .float{position:absolute;font-weight:800;font-size:22px;color:#fff;
    pointer-events:none;z-index:9;text-shadow:0 2px 6px rgba(0,0,0,.6);
    animation:rise 1s forwards;}
  @keyframes rise{0%{transform:translateY(0);opacity:0;}
    15%{opacity:1;}100%{transform:translateY(-60px);opacity:0;}}
  .overlay{position:absolute;inset:0;background:rgba(8,10,16,.92);
    border-radius:16px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;z-index:20;text-align:center;padding:24px;}
  .overlay h2{font-size:30px;}
  .overlay p{color:var(--sub);font-size:14px;line-height:1.7;}
  .big{font-size:46px;font-weight:800;color:var(--accent);}
  button{background:var(--accent);color:#10131c;border:none;font-weight:800;
    font-size:17px;padding:13px 34px;border-radius:30px;cursor:pointer;
    box-shadow:0 6px 18px rgba(255,206,77,.35);}
  button:active{transform:translateY(2px);}
  .ghost{background:none;color:var(--sub);box-shadow:none;font-size:13px;padding:6px;}
  #soundBtn{background:var(--panel);box-shadow:none;border-radius:12px;
    font-size:20px;padding:0;width:40px;height:40px;line-height:1;
    display:flex;align-items:center;justify-content:center;align-self:stretch;}
  #soundBtn.off{opacity:.45;}
  /* ranking ui */
  #regBox{display:flex;flex-direction:column;gap:8px;width:100%;max-width:260px;}
  #nickInput{background:var(--tile);border:2px solid #3a4256;
    border-radius:12px;color:var(--ink);
    font-size:16px;padding:11px 14px;text-align:center;outline:none;
    font-family:inherit;}
  #nickInput:focus{border-color:var(--accent);}
  #regMsg{font-size:12px;color:var(--sub);min-height:16px;}
  #regMsg.ok{color:var(--c2);} #regMsg.err{color:#ff8a8a;}
  #regBox.done #nickInput,#regBox.done #submitBtn{display:none;}
  #rankList{width:100%;max-width:300px;max-height:46vh;overflow-y:auto;
    display:flex;flex-direction:column;gap:4px;}
  .rk-row{display:flex;align-items:center;gap:8px;background:var(--panel);
    border-radius:10px;padding:7px 11px;font-size:14px;}
  .rk-rank{width:34px;font-weight:800;text-align:center;flex:none;}
  .rk-name{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;}
  .rk-score{font-weight:800;font-variant-numeric:tabular-nums;flex:none;}
  .rk-row.g1{background:linear-gradient(90deg,#7a5c00,#b8860b);color:#fff;}
  .rk-row.g2{background:linear-gradient(90deg,#5a5a5a,#9aa0a8);color:#fff;}
  .rk-row.g3{background:linear-gradient(90deg,#6b3a14,#a8682f);color:#fff;}
  .rk-row.me{box-shadow:0 0 0 2px var(--accent);}
  #myRank{font-size:13px;color:var(--accent);min-height:18px;font-weight:700;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>数つなぎ<small>NUMBER CHAIN</small></h1>
    <div class="stats">
      <div class="stat"><div class="label">SCORE</div><div class="val" id="score">0</div></div>
      <div class="stat"><div class="label">BEST</div><div class="val" id="best">0</div></div>
      <button id="soundBtn" aria-label="音のオンオフ">🔊</button>
    </div>
  </header>
  <div id="timebar"><div id="timefill"></div></div>
  <div id="combo"></div>
  <div id="boardWrap">
    <div id="board">
      <svg id="link"></svg>
      <div class="overlay" id="startScreen">
        <h2>数つなぎ</h2>
        <p>連続する数字を指でなぞってつなげよう。<br>
           例: <b style="color:#ffce4d">3→4→5</b> のように隣りのマスへ。<br>
           3つ以上で消える。長いほど高得点！<br>
           続けて消すと<b style="color:#ffce4d">コンボ</b>で点が倍増。<br>
           盤面を<b style="color:#ffce4d">全消し</b>で大ボーナス＋時間延長！<br>
           つなげる手が無くなったら自動でシャッフル。</p>
        <button id="startBtn">スタート</button>
      </div>
      <div class="overlay" id="endScreen" style="display:none">
        <h2>タイムアップ</h2>
        <div class="big" id="finalScore">0</div>
        <p id="endMsg"></p>
        <div id="regBox">
          <input id="nickInput" type="text" maxlength="8"
                 placeholder="ニックネーム（8文字まで）" autocomplete="off">
          <button id="submitBtn">ランキングに登録</button>
          <div id="regMsg"></div>
        </div>
        <button id="rankBtn" class="ghost">🏆 ランキングを見る</button>
        <button id="retryBtn">もう一度</button>
      </div>
      <div class="overlay" id="rankScreen" style="display:none">
        <h2>🏆 ランキング</h2>
        <div id="rankList"><p>読み込み中…</p></div>
        <div id="myRank"></div>
        <button id="rankRetryBtn">もう一度あそぶ</button>
        <button id="rankBackBtn" class="ghost">結果画面に戻る</button>
      </div>
    </div>
  </div>
  <div id="hint">指でなぞって連続する数字をつなごう</div>
</div>
<script>
(function(){
  "use strict";

  // ===== ranking backend (Supabase) =====
  const SB_URL='https://mjipuzmqrjlyfgxowtie.supabase.co';
  const SB_KEY='sb_publishable_dEtlgQmiYpD3chFHMwgftg_m-vRnxV6';
  const Rank={
    // fetch top 20 scores, highest first
    async top(){
      const url=SB_URL+'/rest/v1/scores?select=nickname,score'+
        '&order=score.desc&limit=20';
      const res=await fetch(url,{headers:{
        apikey:SB_KEY, Authorization:'Bearer '+SB_KEY }});
      if(!res.ok) throw new Error('fetch failed '+res.status);
      return res.json();
    },
    // submit a score: keep only the player's personal best (1 row per name)
    async submit(nickname,score){
      // look up existing record for this nickname
      const q=SB_URL+'/rest/v1/scores?select=id,score&nickname=eq.'+
        encodeURIComponent(nickname);
      const cur=await fetch(q,{headers:{
        apikey:SB_KEY, Authorization:'Bearer '+SB_KEY }});
      if(!cur.ok) throw new Error('lookup failed '+cur.status);
      const rows=await cur.json();
      if(rows.length){
        // already registered — only update if this score is higher
        if(score<=rows[0].score) return {updated:false,best:rows[0].score};
        const up=await fetch(SB_URL+'/rest/v1/scores?id=eq.'+rows[0].id,{
          method:'PATCH',
          headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY,
            'Content-Type':'application/json', Prefer:'return=minimal' },
          body:JSON.stringify({score:score})
        });
        if(!up.ok) throw new Error('update failed '+up.status);
        return {updated:true,best:score};
      } else {
        // first time for this nickname — insert a new row
        const ins=await fetch(SB_URL+'/rest/v1/scores',{
          method:'POST',
          headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY,
            'Content-Type':'application/json', Prefer:'return=minimal' },
          body:JSON.stringify({nickname:nickname,score:score})
        });
        if(!ins.ok) throw new Error('insert failed '+ins.status);
        return {updated:true,best:score};
      }
    }
  };

  // ===== audio engine (Web Audio API, no files) =====
  const Audio={
    ctx:null, master:null, bgmGain:null, on:true, bgmTimer:null, step:0,
    init(){
      if(this.ctx) return;
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return;
      this.ctx=new AC();
      this.master=this.ctx.createGain();
      this.master.gain.value=0.5;
      this.master.connect(this.ctx.destination);
      this.bgmGain=this.ctx.createGain();
      this.bgmGain.gain.value=0.18;
      this.bgmGain.connect(this.master);
    },
    resume(){ if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
    // one short tone
    tone(freq,dur,type,dest,vol){
      if(!this.ctx) return;
      const t=this.ctx.currentTime;
      const o=this.ctx.createOscillator();
      const g=this.ctx.createGain();
      o.type=type||'sine';
      o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol||0.5,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.connect(g); g.connect(dest||this.master);
      o.start(t); o.stop(t+dur+0.02);
    },
    // sfx: clearing a chain — pitch rises with combo
    clear(combo,len){
      if(!this.on||!this.ctx) return;
      const base=420+Math.min(combo,8)*70;
      for(let i=0;i<Math.min(len,5);i++){
        const f=base*Math.pow(1.18,i);
        setTimeout(()=>this.tone(f,0.16,'triangle',this.master,0.32),i*45);
      }
    },
    // sfx: tile selected during drag
    tick(){
      if(!this.on||!this.ctx) return;
      this.tone(620,0.05,'square',this.master,0.12);
    },
    // sfx: all clear fanfare
    fanfare(){
      if(!this.on||!this.ctx) return;
      [523,659,784,1047].forEach((f,i)=>
        setTimeout(()=>this.tone(f,0.4,'triangle',this.master,0.36),i*110));
    },
    // sfx: shuffle swoosh
    shuffle(){
      if(!this.on||!this.ctx) return;
      [300,360,440,540].forEach((f,i)=>
        setTimeout(()=>this.tone(f,0.12,'sine',this.master,0.2),i*55));
    },
    // sfx: game over
    over(){
      if(!this.on||!this.ctx) return;
      [440,392,330].forEach((f,i)=>
        setTimeout(()=>this.tone(f,0.45,'sine',this.master,0.3),i*160));
    },
    // light, poppy looping bgm
    startBGM(){
      if(!this.on||!this.ctx||this.bgmTimer) return;
      // a cheerful pentatonic loop
      const notes=[523,587,659,784,880,784,659,587,
                   523,659,784,880,1047,880,784,659];
      const bass=[131,131,165,165,196,196,165,165];
      this.step=0;
      const beat=300;
      this.bgmTimer=setInterval(()=>{
        if(!this.on) return;
        const n=notes[this.step%notes.length];
        this.tone(n,0.22,'triangle',this.bgmGain,0.5);
        if(this.step%2===0){
          const b=bass[(this.step>>1)%bass.length];
          this.tone(b,0.34,'sine',this.bgmGain,0.6);
        }
        this.step++;
      },beat);
    },
    stopBGM(){
      if(this.bgmTimer){ clearInterval(this.bgmTimer); this.bgmTimer=null; }
    },
    toggle(){
      this.on=!this.on;
      if(!this.on) this.stopBGM();
      try{ localStorage.setItem('nc_sound',this.on?'1':'0'); }catch(e){}
      return this.on;
    }
  };
  try{ Audio.on=localStorage.getItem('nc_sound')!=='0'; }catch(e){}

  const COLS=6, ROWS=7, MAXV=5;
  const board=document.getElementById('board');
  const svg=document.getElementById('link');
  const elScore=document.getElementById('score');
  const elBest=document.getElementById('best');
  const elTimefill=document.getElementById('timefill');
  const elCombo=document.getElementById('combo');
  const elHint=document.getElementById('hint');

  let GAP=6, SIZE=0, cells=[], grid=[], path=[], dragging=false;
  let score=0, best=0, combo=0, comboTimer=0, running=false;
  let timeLeft=0, totalTime=75, lastTs=0;

  try{ best=parseInt(localStorage.getItem('nc_best')||'0',10)||0; }catch(e){}
  elBest.textContent=best;

  function layout(){
    const wrap=document.getElementById('boardWrap');
    const availW=Math.min(wrap.clientWidth, 412);
    const availH=wrap.clientHeight;
    let s=Math.floor((availW-GAP*(COLS+1))/COLS);
    const sByH=Math.floor((availH-GAP*(ROWS+1))/ROWS);
    s=Math.min(s,sByH);
    SIZE=s;
    board.style.width=(COLS*SIZE+GAP*(COLS+1))+'px';
    board.style.height=(ROWS*SIZE+GAP*(ROWS+1))+'px';
    svg.setAttribute('width',board.style.width);
    svg.setAttribute('height',board.style.height);
    for(const c of cells) placeCell(c);
  }
  const px=i=>GAP+i*(SIZE+GAP);
  const center=(r,c)=>({x:px(c)+SIZE/2, y:px(r)+SIZE/2});

  function placeCell(c){
    c.el.style.width=SIZE+'px';
    c.el.style.height=SIZE+'px';
    c.el.style.left=px(c.col)+'px';
    c.el.style.top=px(c.row)+'px';
    c.el.style.fontSize=Math.round(SIZE*0.42)+'px';
  }

  function newGame(){
    cells.forEach(c=>c.el.remove());
    cells=[]; grid=[]; path=[]; score=0; combo=0; comboTimer=0;
    timeLeft=totalTime; running=true;
    elScore.textContent='0';
    for(let r=0;r<ROWS;r++){
      grid[r]=[];
      for(let c=0;c<COLS;c++) grid[r][c]=makeCell(r,c,1+Math.floor(Math.random()*MAXV));
    }
    layout();
    ensurePlayable();
    Audio.startBGM();
    lastTs=performance.now();
    requestAnimationFrame(loop);
  }

  function makeCell(row,col,val){
    const el=document.createElement('div');
    el.className='cell v'+val;
    el.textContent=val;
    board.appendChild(el);
    const c={el,row,col,val};
    placeCell(c);
    cells.push(c);
    return c;
  }

  // ---- input ----
  function cellFromPoint(x,y){
    const rect=board.getBoundingClientRect();
    const lx=x-rect.left, ly=y-rect.top;
    const col=Math.floor((lx-GAP/2)/(SIZE+GAP));
    const row=Math.floor((ly-GAP/2)/(SIZE+GAP));
    if(row<0||row>=ROWS||col<0||col>=COLS) return null;
    const c=grid[row][col];
    if(!c) return null;
    const ctr=center(row,col);
    if(Math.hypot(lx-ctr.x,ly-ctr.y) > SIZE*0.62) return null;
    return c;
  }
  function adjacent(a,b){
    return Math.abs(a.row-b.row)+Math.abs(a.col-b.col)===1;
  }
  function tryAdd(c){
    if(!c||!running) return;
    if(path.length && path[path.length-1]===c) return;
    // backtrack
    if(path.length>=2 && path[path.length-2]===c){
      path.pop().el.classList.remove('sel');
      drawPath(); return;
    }
    if(path.includes(c)) return;
    if(path.length){
      const last=path[path.length-1];
      if(!adjacent(last,c)) return;
      if(Math.abs(c.val-last.val)!==1) return; // must be ±1 consecutive
    }
    path.push(c); c.el.classList.add('sel');
    Audio.tick();
    drawPath();
  }
  function drawPath(){
    if(path.length<2){ svg.innerHTML=''; return; }
    let d='';
    path.forEach((c,i)=>{
      const p=center(c.row,c.col);
      d+=(i?'L':'M')+p.x+' '+p.y+' ';
    });
    const ok=path.length>=3;
    svg.innerHTML='<path d="'+d+'" fill="none" stroke="'+
      (ok?'#fff':'rgba(255,255,255,.45)')+'" stroke-width="'+
      Math.max(5,SIZE*0.16)+'" stroke-linecap="round" stroke-linejoin="round"/>';
  }

  function pointer(e){
    const t=e.touches?e.touches[0]:e;
    return {x:t.clientX,y:t.clientY};
  }
  function onStart(e){
    if(!running) return;
    e.preventDefault();
    dragging=true;
    const p=pointer(e);
    tryAdd(cellFromPoint(p.x,p.y));
  }
  function onMove(e){
    if(!dragging) return;
    e.preventDefault();
    const p=pointer(e);
    tryAdd(cellFromPoint(p.x,p.y));
  }
  function onEnd(e){
    if(!dragging) return;
    dragging=false;
    resolve();
  }
  board.addEventListener('touchstart',onStart,{passive:false});
  board.addEventListener('touchmove',onMove,{passive:false});
  board.addEventListener('touchend',onEnd);
  board.addEventListener('mousedown',onStart);
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onEnd);

  // ---- resolve a chain ----
  function resolve(){
    const chain=path.slice();
    path.forEach(c=>c.el.classList.remove('sel'));
    path=[]; svg.innerHTML='';
    if(chain.length<3){ return; }

    // score: base grows with length, multiplied by combo
    combo++; comboTimer=2.4;
    const lenBonus=chain.length*(chain.length+1)/2; // 3->6,4->10,5->15...
    const mult=1+(combo-1)*0.5;
    const gained=Math.round(lenBonus*10*mult);
    score+=gained;
    elScore.textContent=score;
    showCombo(chain);
    Audio.clear(combo,chain.length);
    floatText(chain[chain.length-1], '+'+gained);

    // remove
    const cols=new Set();
    chain.forEach(c=>{
      c.el.classList.add('pop');
      grid[c.row][c.col]=null;
      cols.add(c.col);
      setTimeout(()=>{ c.el.remove(); cells=cells.filter(x=>x!==c); },260);
    });

    // all-clear bonus: board emptied
    let remaining=0;
    for(let r=0;r<ROWS;r++)for(let cc=0;cc<COLS;cc++) if(grid[r][cc]) remaining++;
    if(remaining===0){
      const bonus=2000;
      score+=bonus;
      elScore.textContent=score;
      timeLeft=Math.min(totalTime,timeLeft+8); // reward: +8s
      elCombo.textContent='ALL CLEAR! +'+bonus+'  ⏱+8s';
      elCombo.classList.add('show');
      Audio.fanfare();
      flashBoard();
    }

    setTimeout(()=>collapse(cols),200);
  }

  function flashBoard(){
    const fx=document.createElement('div');
    fx.style.cssText='position:absolute;inset:0;border-radius:16px;'+
      'background:radial-gradient(circle,rgba(255,206,77,.9),rgba(255,206,77,0));'+
      'z-index:15;pointer-events:none;animation:rise .9s forwards;';
    board.appendChild(fx);
    setTimeout(()=>fx.remove(),900);
  }

  function showCombo(chain){
    if(combo>=2){
      elCombo.textContent=combo+' COMBO!  ×'+(1+(combo-1)*0.5).toFixed(1);
      elCombo.classList.add('show');
    } else {
      elCombo.textContent=chain.length+'つなぎ！';
      elCombo.classList.add('show');
    }
  }
  function floatText(c,txt){
    const f=document.createElement('div');
    f.className='float'; f.textContent=txt;
    f.style.left=(px(c.col))+'px';
    f.style.top=(px(c.row))+'px';
    f.style.width=SIZE+'px'; f.style.textAlign='center';
    board.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }

  function collapse(cols){
    // gravity per column
    for(const col of cols){
      let write=ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(grid[r][col]){
          const c=grid[r][col];
          grid[r][col]=null;
          grid[write][col]=c;
          c.row=write; placeCell(c);
          write--;
        }
      }
      // refill — harder over time: bias toward varied values
      for(let r=write;r>=0;r--){
        const v=1+Math.floor(Math.random()*MAXV);
        const c=makeCell(-1,col,v);
        c.row=r; grid[r][col]=c;
        c.el.style.top=px(-1)+'px';
        requestAnimationFrame(()=>{ c.el.style.top=px(r)+'px'; });
      }
    }
    // after refill, ensure the board still has a valid move
    setTimeout(ensurePlayable,260);
  }

  // ---- deadlock detection & auto-shuffle ----
  function hasMove(){
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    function dfs(r,c,len,visited){
      if(len>=3) return true;
      for(const d of dirs){
        const nr=r+d[0], nc=c+d[1];
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
        const nb=grid[nr][nc];
        if(!nb) continue;
        const key=nr*COLS+nc;
        if(visited.has(key)) continue;
        if(Math.abs(nb.val-grid[r][c].val)!==1) continue;
        visited.add(key);
        if(dfs(nr,nc,len+1,visited)) return true;
        visited.delete(key);
      }
      return false;
    }
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(!grid[r][c]) continue;
      if(dfs(r,c,1,new Set([r*COLS+c]))) return true;
    }
    return false;
  }
  function ensurePlayable(){
    if(!running) return;
    let guard=0;
    while(!hasMove() && guard++<60){
      // reassign every tile a fresh random value, animate a flip
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
        const cell=grid[r][c];
        if(!cell) continue;
        cell.val=1+Math.floor(Math.random()*MAXV);
        cell.el.textContent=cell.val;
        cell.el.className='cell v'+cell.val;
      }
    }
    if(guard>0){
      elCombo.textContent='シャッフル！';
      elCombo.classList.add('show');
      Audio.shuffle();
      setTimeout(()=>{ if(combo<1) elCombo.classList.remove('show'); },1200);
    }
  }

  // ---- game loop ----
  function loop(ts){
    if(!running) return;
    const dt=(ts-lastTs)/1000; lastTs=ts;
    timeLeft-=dt;
    if(comboTimer>0){
      comboTimer-=dt;
      if(comboTimer<=0){ combo=0; elCombo.classList.remove('show'); }
    }
    elTimefill.style.width=Math.max(0,timeLeft/totalTime*100)+'%';
    if(timeLeft<=0){ endGame(); return; }
    requestAnimationFrame(loop);
  }

  function endGame(){
    running=false;
    elTimefill.style.width='0%';
    Audio.stopBGM();
    Audio.over();
    if(score>best){
      best=score; elBest.textContent=best;
      try{ localStorage.setItem('nc_best',String(best)); }catch(e){}
    }
    document.getElementById('finalScore').textContent=score;
    const msg = score>=best && score>0 ? '🎉 ハイスコア更新！'
      : score>=2000 ? 'お見事！コンボが冴えてる' : 'コンボを狙うともっと伸びる';
    document.getElementById('endMsg').textContent=msg;
    // reset registration box; restore remembered nickname
    regBox.classList.remove('done');
    regMsg.textContent=''; regMsg.className='';
    try{ nickInput.value=localStorage.getItem('nc_nick')||''; }catch(e){}
    document.getElementById('endScreen').style.display='flex';
  }

  // ---- ranking screen control ----
  const regBox=document.getElementById('regBox');
  const nickInput=document.getElementById('nickInput');
  const submitBtn=document.getElementById('submitBtn');
  const regMsg=document.getElementById('regMsg');
  const rankScreen=document.getElementById('rankScreen');
  const rankList=document.getElementById('rankList');
  const myRank=document.getElementById('myRank');

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g,m=>(
      {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  async function showRanking(){
    document.getElementById('endScreen').style.display='none';
    rankScreen.style.display='flex';
    rankList.innerHTML='<p>読み込み中…</p>';
    myRank.textContent='';
    let myName=''; try{ myName=localStorage.getItem('nc_nick')||''; }catch(e){}
    try{
      const rows=await Rank.top();
      if(!rows.length){
        rankList.innerHTML='<p style="color:var(--sub)">'+
          'まだ誰も登録していません。<br>1番乗りのチャンス！</p>';
        return;
      }
      let html='', myIdx=-1;
      rows.forEach((r,i)=>{
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        const cls=i===0?'g1':i===1?'g2':i===2?'g3':'';
        const isMe=myName && r.nickname===myName;
        if(isMe && myIdx<0) myIdx=i;
        html+='<div class="rk-row '+cls+(isMe?' me':'')+'">'+
          '<span class="rk-rank">'+medal+'</span>'+
          '<span class="rk-name">'+escapeHtml(r.nickname)+'</span>'+
          '<span class="rk-score">'+r.score.toLocaleString()+'</span></div>';
      });
      rankList.innerHTML=html;
      if(myIdx>=0){
        myRank.textContent='あなた（'+myName+'）は '+(myIdx+1)+'位';
      } else if(myName){
        myRank.textContent='あなた（'+myName+'）は20位圏外';
      }
    }catch(e){
      rankList.innerHTML='<p class="err" style="color:#ff8a8a">'+
        'ランキングを読み込めませんでした。<br>'+
        '電波の良い場所でもう一度お試しください。</p>';
    }
  }

  submitBtn.onclick=async()=>{
    const name=nickInput.value.trim();
    if(!name){ regMsg.textContent='ニックネームを入れてね';
      regMsg.className='err'; return; }
    regMsg.textContent='登録中…'; regMsg.className='';
    submitBtn.disabled=true;
    try{
      try{ localStorage.setItem('nc_nick',name); }catch(e){}
      const r=await Rank.submit(name,score);
      regBox.classList.add('done');
      regMsg.className='ok';
      regMsg.textContent=r.updated?'登録しました！'
        :'自己ベスト（'+r.best.toLocaleString()+'）には届かず。次こそ！';
      setTimeout(showRanking,800);
    }catch(e){
      regMsg.textContent='登録できませんでした。電波を確認して再度お試しを。';
      regMsg.className='err';
    }
    submitBtn.disabled=false;
  };
  document.getElementById('rankBtn').onclick=showRanking;
  document.getElementById('rankBackBtn').onclick=()=>{
    rankScreen.style.display='none';
    document.getElementById('endScreen').style.display='flex';
  };
  document.getElementById('rankRetryBtn').onclick=()=>{
    rankScreen.style.display='none';
    Audio.resume();
    newGame();
  };

  document.getElementById('startBtn').onclick=()=>{
    Audio.init(); Audio.resume();
    document.getElementById('startScreen').style.display='none';
    newGame();
  };
  document.getElementById('retryBtn').onclick=()=>{
    Audio.resume();
    document.getElementById('endScreen').style.display='none';
    newGame();
  };
  // sound on/off button
  const soundBtn=document.getElementById('soundBtn');
  function syncSoundBtn(){
    soundBtn.textContent=Audio.on?'🔊':'🔇';
    soundBtn.classList.toggle('off',!Audio.on);
  }
  syncSoundBtn();
  soundBtn.onclick=()=>{
    Audio.init();
    const on=Audio.toggle();
    if(on){ Audio.resume(); if(running) Audio.startBGM(); }
    syncSoundBtn();
  };
  window.addEventListener('resize',()=>{ if(SIZE) layout(); });
  // initial sizing so board has dimensions behind overlay
  setTimeout(()=>{
    board.style.width='372px'; board.style.height='434px';
    svg.setAttribute('width','372'); svg.setAttribute('height','434');
    const wrap=document.getElementById('boardWrap');
    const availW=Math.min(wrap.clientWidth,412);
    let s=Math.floor((availW-GAP*(COLS+1))/COLS);
    const sByH=Math.floor((wrap.clientHeight-GAP*(ROWS+1))/ROWS);
    SIZE=Math.min(s,sByH);
    board.style.width=(COLS*SIZE+GAP*(COLS+1))+'px';
    board.style.height=(ROWS*SIZE+GAP*(ROWS+1))+'px';
  },30);
})();
</script>
</body>
